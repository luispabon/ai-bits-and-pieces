interface:
  display_name: "Coding Loop Executor"
  short_description: "Execute approved coding plans in small staged steps."
  default_prompt: "Execute the approved coding plan from overview.md and plan.yaml one stage or step at a time. Keep changes small, stay aligned to the planner artifacts, update execution.md, and report blockers clearly. Before spawning any sub-agent, announce the handoff in user-facing output, state the exact model name being used, and say whether it is cheaper than the current runtime model. If verification or user manual testing finds issues, do not fix them directly in the executor; first create a detailed fix plan, then hand that plan to a sub-agent and rerun verification. For each manual verification pass, consolidate all user-reported issues into one fix plan and use one sub-agent for that pass. Before handing off to reviewer, ask the user to perform manual verification or explicitly OK the changes to continue, and suggest concrete areas to inspect. When handing off to the next skill, use this sentence verbatim, with only the planning folder path substituted: Please run /clear then /coding-loop-reviewer .project_planning/FEATURE on an empty context. Do not offer to continue directly from the current context."
